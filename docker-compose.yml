services:
  monolith-app:
    build: ./monolith-app
    ports:
      - "8088:8088"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/marketcali_db
    depends_on:
      - mysql-db

  mysql-db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: marketcali_db
      MYSQL_USER: miguel
      MYSQL_PASSWORD: 12345
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - monolith-app

volumes:
  mysql-data:
